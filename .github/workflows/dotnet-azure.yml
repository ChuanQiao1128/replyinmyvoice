name: dotnet-azure

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
    branches:
      - main
      - delivery/api-fixes

permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore backend-dotnet/ReplyInMyVoice.sln
      - name: Build
        run: dotnet build backend-dotnet/ReplyInMyVoice.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test backend-dotnet/ReplyInMyVoice.sln --configuration Release --no-build
      - name: Publish API
        run: dotnet publish backend-dotnet/src/ReplyInMyVoice.Api/ReplyInMyVoice.Api.csproj --configuration Release --output backend-dotnet/artifacts/api
      - name: Publish Worker
        run: dotnet publish backend-dotnet/src/ReplyInMyVoice.Worker/ReplyInMyVoice.Worker.csproj --configuration Release --output backend-dotnet/artifacts/worker
      - name: Publish Functions
        run: dotnet publish backend-dotnet/src/ReplyInMyVoice.Functions/ReplyInMyVoice.Functions.csproj --configuration Release --output backend-dotnet/artifacts/functions

  sqlserver-migration:
    runs-on: ubuntu-latest
    env:
      SQLSERVER_SA_PASSWORD: "LocalCiOnly_${{ github.run_id }}!"
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_PID: "Developer"
          MSSQL_SA_PASSWORD: "LocalCiOnly_${{ github.run_id }}!"
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore backend-dotnet/ReplyInMyVoice.sln
      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef --version 8.*
      - name: Wait for SQL Server
        run: |
          for attempt in {1..60}; do
            if bash -c '</dev/tcp/127.0.0.1/1433' >/dev/null 2>&1; then
              sleep 10
              exit 0
            fi
            sleep 2
          done

          echo "SQL Server did not open port 1433 in time."
          exit 1
      - name: Apply migrations to SQL Server
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          SQL_CONNECTION="Server=localhost,1433;Initial Catalog=ReplyInMyVoiceMigrationGate;Persist Security Info=False;User ID=sa;Password=${SQLSERVER_SA_PASSWORD};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;"

          for attempt in {1..6}; do
            if ConnectionStrings__DefaultConnection="$SQL_CONNECTION" dotnet ef database update \
              --project backend-dotnet/src/ReplyInMyVoice.Infrastructure/ReplyInMyVoice.Infrastructure.csproj \
              --startup-project backend-dotnet/src/ReplyInMyVoice.Infrastructure/ReplyInMyVoice.Infrastructure.csproj \
              --context AppDbContext; then
              exit 0
            fi

            exit_code=$?
            if [ "$attempt" -eq 6 ]; then
              exit "$exit_code"
            fi

            sleep 10
          done

  deploy:
    needs:
      - build-test
      - sqlserver-migration
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build deployment package
        run: |
          dotnet publish backend-dotnet/src/ReplyInMyVoice.Functions/ReplyInMyVoice.Functions.csproj --configuration Release --output backend-dotnet/artifacts/functions
          cd backend-dotnet/artifacts/functions
          zip -qr ../replyinmyvoice-functions.zip .
      - name: Apply database migrations
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_SQL_SERVER_NAME: ${{ vars.AZURE_SQL_SERVER_NAME }}
          AZURE_SQL_DATABASE_NAME: ${{ vars.AZURE_SQL_DATABASE_NAME }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          export PATH="$PATH:$HOME/.dotnet/tools"
          SQL_ADMIN_USER="$(az keyvault secret show --vault-name "$AZURE_KEY_VAULT_NAME" --name "sql-admin-user" --query value -o tsv)"
          SQL_ADMIN_PASSWORD="$(az keyvault secret show --vault-name "$AZURE_KEY_VAULT_NAME" --name "sql-admin-password" --query value -o tsv)"
          SQL_CONNECTION="Server=tcp:${AZURE_SQL_SERVER_NAME}.database.windows.net,1433;Initial Catalog=${AZURE_SQL_DATABASE_NAME};Persist Security Info=False;User ID=${SQL_ADMIN_USER};Password=${SQL_ADMIN_PASSWORD};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          ConnectionStrings__DefaultConnection="$SQL_CONNECTION" dotnet ef database update \
            --project backend-dotnet/src/ReplyInMyVoice.Infrastructure/ReplyInMyVoice.Infrastructure.csproj \
            --startup-project backend-dotnet/src/ReplyInMyVoice.Api/ReplyInMyVoice.Api.csproj \
            --context AppDbContext
      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_FUNCTION_APP_NAME }}" \
            --src backend-dotnet/artifacts/replyinmyvoice-functions.zip
      - name: Smoke test
        run: curl --fail "https://${{ vars.AZURE_FUNCTION_APP_NAME }}.azurewebsites.net/api/health"
