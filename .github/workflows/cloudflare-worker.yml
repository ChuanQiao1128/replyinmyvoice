name: cloudflare-worker

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_AZURE_API_BASE_URL: ${{ vars.NEXT_PUBLIC_AZURE_API_BASE_URL }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout main scenario baseline
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .scenario-main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check scenario evaluation regression
        if: github.event_name == 'pull_request'
        run: node --import tsx scripts/check-scenario-evaluation-regression.ts --base .scenario-main/docs/scenario-evaluation-results.md --candidate docs/scenario-evaluation-results.md
      - name: Remove scenario baseline checkout
        if: github.event_name == 'pull_request'
        run: rm -rf .scenario-main
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run cf:build

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run cf:deploy
