name: cloudflare-worker

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
  OPENAI_MODEL_PRIMARY: ${{ vars.OPENAI_MODEL_PRIMARY }}
  OPENAI_MODEL_REPAIR: ${{ vars.OPENAI_MODEL_REPAIR }}
  OPENAI_MODEL_ESCALATION: ${{ vars.OPENAI_MODEL_ESCALATION }}
  OPENAI_MODEL_FINAL_STRONG: ${{ vars.OPENAI_MODEL_FINAL_STRONG }}
  OPENAI_ENABLE_FINAL_STRONG_MODEL: ${{ vars.OPENAI_ENABLE_FINAL_STRONG_MODEL }}
  OPENAI_MAX_MODEL_CALLS_PER_REWRITE: ${{ vars.OPENAI_MAX_MODEL_CALLS_PER_REWRITE }}
  WRITING_SIGNAL_PROVIDER: ${{ vars.WRITING_SIGNAL_PROVIDER }}
  WRITING_SIGNAL_TIMEOUT_SEC: ${{ vars.WRITING_SIGNAL_TIMEOUT_SEC }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  SAPLING_API_KEY: ${{ secrets.SAPLING_API_KEY }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run cf:build

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run cf:deploy
