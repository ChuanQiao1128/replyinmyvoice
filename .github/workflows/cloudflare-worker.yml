name: cloudflare-worker

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

env:
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
  NEXT_PUBLIC_AZURE_API_BASE_URL: ${{ vars.NEXT_PUBLIC_AZURE_API_BASE_URL }}
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
  NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL }}
  NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: ${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL }}
  NEXT_PUBLIC_CLERK_PROXY_URL: ${{ vars.NEXT_PUBLIC_CLERK_PROXY_URL }}
  NEXT_PUBLIC_CLERK_JS_URL: ${{ vars.NEXT_PUBLIC_CLERK_JS_URL }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
  OPENAI_MODEL_PRIMARY: ${{ vars.OPENAI_MODEL_PRIMARY }}
  OPENAI_MODEL_REPAIR: ${{ vars.OPENAI_MODEL_REPAIR }}
  OPENAI_MODEL_ESCALATION: ${{ vars.OPENAI_MODEL_ESCALATION }}
  OPENAI_MODEL_FINAL_STRONG: ${{ vars.OPENAI_MODEL_FINAL_STRONG }}
  OPENAI_ENABLE_FINAL_STRONG_MODEL: ${{ vars.OPENAI_ENABLE_FINAL_STRONG_MODEL }}
  OPENAI_MAX_MODEL_CALLS_PER_REWRITE: ${{ vars.OPENAI_MAX_MODEL_CALLS_PER_REWRITE }}
  OPENAI_MODEL_CHEAP_STRUCTURED: ${{ vars.OPENAI_MODEL_CHEAP_STRUCTURED }}
  OPENAI_MODEL_MID_WRITER: ${{ vars.OPENAI_MODEL_MID_WRITER }}
  OPENAI_MODEL_STRONG_ESCALATION: ${{ vars.OPENAI_MODEL_STRONG_ESCALATION }}
  NATURALNESS_THRESHOLD: ${{ vars.NATURALNESS_THRESHOLD }}
  MAX_ESCALATIONS: ${{ vars.MAX_ESCALATIONS }}
  OPENAI_PRICE_CHEAP_INPUT_PER_1M: ${{ vars.OPENAI_PRICE_CHEAP_INPUT_PER_1M }}
  OPENAI_PRICE_CHEAP_OUTPUT_PER_1M: ${{ vars.OPENAI_PRICE_CHEAP_OUTPUT_PER_1M }}
  OPENAI_PRICE_MID_INPUT_PER_1M: ${{ vars.OPENAI_PRICE_MID_INPUT_PER_1M }}
  OPENAI_PRICE_MID_OUTPUT_PER_1M: ${{ vars.OPENAI_PRICE_MID_OUTPUT_PER_1M }}
  OPENAI_PRICE_STRONG_INPUT_PER_1M: ${{ vars.OPENAI_PRICE_STRONG_INPUT_PER_1M }}
  OPENAI_PRICE_STRONG_OUTPUT_PER_1M: ${{ vars.OPENAI_PRICE_STRONG_OUTPUT_PER_1M }}
  OPENAI_TIMEOUT_SEC: ${{ vars.OPENAI_TIMEOUT_SEC }}
  WRITING_SIGNAL_PROVIDER: ${{ vars.WRITING_SIGNAL_PROVIDER }}
  WRITING_SIGNAL_TIMEOUT_SEC: ${{ vars.WRITING_SIGNAL_TIMEOUT_SEC }}
  STRIPE_TIMEOUT_SEC: ${{ vars.STRIPE_TIMEOUT_SEC }}
  LAUNCH_CONFIRMED: ${{ vars.LAUNCH_CONFIRMED }}
  REWRITE_LEARNING_LOG_ENABLED: ${{ vars.REWRITE_LEARNING_LOG_ENABLED }}
  REWRITE_COST_LOG_ENABLED: ${{ vars.REWRITE_COST_LOG_ENABLED }}
  ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
  ADMIN_CLERK_USER_IDS: ${{ vars.ADMIN_CLERK_USER_IDS }}
  ADMIN_ALLOW_RAW_REWRITE_TEXT: ${{ vars.ADMIN_ALLOW_RAW_REWRITE_TEXT }}
  SAPLING_PRICE_PER_1000_CHARS_USD: ${{ vars.SAPLING_PRICE_PER_1000_CHARS_USD }}
  ADMIN_NZD_PER_USD: ${{ vars.ADMIN_NZD_PER_USD }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DIRECT_URL: ${{ secrets.DIRECT_URL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  SAPLING_API_KEY: ${{ secrets.SAPLING_API_KEY }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout main scenario baseline
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .scenario-main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check scenario evaluation regression
        if: github.event_name == 'pull_request'
        run: node --import tsx scripts/check-scenario-evaluation-regression.ts --base .scenario-main/docs/scenario-evaluation-results.md --candidate docs/scenario-evaluation-results.md
      - name: Remove scenario baseline checkout
        if: github.event_name == 'pull_request'
        run: rm -rf .scenario-main
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run cf:build

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run cf:deploy
